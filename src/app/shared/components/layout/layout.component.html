<div class="diseno-panel" [class.sidebar-abierto]="sidebarAbierto">
  <div class="sidebar-overlay" *ngIf="sidebarAbierto" (click)="sidebarAbierto = false"></div>
  <app-sidebar class="area-lateral" [class.mostrar]="sidebarAbierto" (closeSidebar)="sidebarAbierto = false"></app-sidebar>
  <app-header class="area-header" (toggleSidebar)="sidebarAbierto = !sidebarAbierto"></app-header>
  <main class="area-principal">
    <router-outlet></router-outlet>
  </main>
</div>
<app-confirm-modal></app-confirm-modal>

<!-- Overlay de Cuenta Pendiente (Access Gate) -->
<div *ngIf="mostrarModalPendiente" class="acceso-pendiente-overlay">
  <div class="acceso-pendiente-modal">
    <h2>Cuenta pendiente</h2>
    <p class="descripcion">
      Tu cuenta fue creada correctamente. El administrador debe activarte una membresía para que puedas acceder al sistema.
    </p>

    <!-- Stepper Visual -->
    <div class="stepper-pasos">
      <!-- Paso 1: Cuenta creada -->
      <div class="paso completado">
        <div class="indicador-circulo">
          <svg viewBox="0 0 24 24" class="icono-check" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="paso-texto">Cuenta creada</span>
      </div>

      <!-- Paso 2: Asignación de membresía -->
      <div class="paso" [ngClass]="paso2Estado">
        <div class="indicador-circulo">
          <span *ngIf="paso2Estado !== 'completado'">2</span>
          <svg *ngIf="paso2Estado === 'completado'" viewBox="0 0 24 24" class="icono-check" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="paso-texto">Asignación de membresía — {{ paso2Estado === 'completado' ? 'completada' : 'pendiente' }}</span>
      </div>

      <!-- Paso 3: Acceso completo -->
      <div class="paso" [ngClass]="paso3Estado">
        <div class="indicador-circulo">
          <span *ngIf="paso3Estado !== 'completado'">3</span>
          <svg *ngIf="paso3Estado === 'completado'" viewBox="0 0 24 24" class="icono-check" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="paso-texto">Acceso completo al sistema</span>
      </div>
    </div>

    <!-- Acción -->
    <button (click)="cerrarSesion()" class="btn-cerrar-sesion">Cerrar sesión</button>
  </div>
</div>
