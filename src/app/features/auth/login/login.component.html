<main class="contenedor-sesion">

  <section class="tarjeta-sesion">

    <header class="encabezado-sesion">
      <h1 class="logo-texto">FIT<span>GO</span></h1>
      <p class="subtitulo-sesion">Sistema de Gestión de Gimnasio</p>
    </header>

    <div *ngIf="error" class="alerta-error">
      <span>{{ error }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" id="formularioSesion">

      <div class="grupo-campo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="correo" placeholder="correo@ejemplo.com" required autocomplete="email">
      </div>

      <div class="grupo-campo grupo-campo-espaciado">
        <label for="password">Contraseña</label>
        <div class="envoltorio-contrasena">
          <input [type]="verContrasena ? 'text' : 'password'" id="password" name="password" [(ngModel)]="password" placeholder="Contraseña" required autocomplete="current-password">
          <button type="button" (click)="alternarContrasena()" class="boton-ojo" aria-label="Mostrar u ocultar contraseña">
            <span class="icono-ojo">{{ verContrasena ? 'Ocultar' : 'Mostrar' }}</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary boton-completo boton-formulario-sesion">
        Iniciar sesión
      </button>

      <div class="pie-formulario">
        <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
      </div>

    </form>

    <footer class="pie-sesion">
      <p>FitGO &copy; 2026 - Todos los derechos reservados</p>
    </footer>

  </section>

  <aside class="panel-marca">
    <div class="contenido-marca">
      <img src="images/fitgo-banner-1.png" alt="FitGO" class="logo-banner-marca" onerror="this.src='https://placehold.co/360x180?text=FitGO+Banner'">
      <h2>Transforma tu cuerpo,<br><span>transforma tu vida.</span></h2>
      <p>Gestiona rutinas, membresías y progreso desde un solo lugar.</p>
    </div>
  </aside>

</main>
